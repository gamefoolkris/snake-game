          </span>
        </span>

    <style>
      :root {
        --purp1: hsl(292, 97%, 86%);
        --purp2: hsl(292, 96%, 74%);
        --purp3: hsl(292, 95%, 62%);
        --dark1: hsl(0, 0%, 27%);
        --dark2: hsl(0, 0%, 19%);
        --dark3: hsl(0, 0%, 13%);
        --dark4: hsl(0, 0%, 9%);
      }
      #sfx {
        position: fixed;
        display: none;
        z-index: -600;
      }
      #res {
        position: absolute;
        display: inline-block;
        font-family: Arial, Helvetica, sans-serif;
        position: fixed;
        top: 75%;
        left: 50%;
        text-align: center;
        transform: translate(-50%, -50%);
        font-size: 2.75cqw;
        touch-action: manipulation;
      }
      .kb {
        font-weight: bold;
        touch-action: manipulation;
      }
      #Cdown-par {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 46.9%;
        height: 46.9%;
        background: none;
        border: none;
        transform: translate(-50%, -50%);
        touch-action: manipulation;
      }
      #Cdown {
        position: absolute;
        width: 60%;
        font-size: 12cqw;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        touch-action: manipulation;
      }
      #CDimg {
        image-rendering: optimizeSpeed;
        image-rendering: -moz-crisp-edges;
        image-rendering: -o-crisp-edges;

        left: 50%;

        transform: translate(-50%, -50%);

        touch-action: manipulation;
      }

        width: 60%;
        top: 33%;
        left: 50%;
        font-size: 6cqw;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        transform: translate(-50%, -50%);
        font-weight: bold;
        color: hsl(272, 100%, 60%);
        -webkit-text-stroke-width: 0.33cqw;
        -webkit-text-stroke-color: hsl(272, 80%, 50%);
        touch-action: manipulation;
      }
      #Pscore {
        position: absolute;
        width: 60%;
        top: 50%;
        left: 50%;
        font-size: 6cqw;
        font-family: Arial, Helvetica, sans-serif;
        text-align: center;
        transform: translate(-50%, -50%);

        display: inline-block;
        width: 100%;
        height: 100%;
        touch-action: manipulation;

        touch-action: manipulation;

      function tween(start, end, steps, fss = 2, fes = 2, easing = 'linear') {
        if (steps < fss + fes + 1) {
          throw new Error("Not enough steps for fixed start/end steps.");
        }

        const easeFn = easingFunctions[easing];
        if (!easeFn) {
          throw new Error(`Easing function "${easing}" not found.`);
        }

        const result = [];
        const tweenSteps = steps - fss - fes;

        for (let i = 0; i < fss; i++) {
          result.push(start);
        }

        for (let i = 1; i <= tweenSteps; i++) {
          const t = i / (tweenSteps + 1);
          const easedT = easeFn(t);
          result.push(start + (end - start) * easedT);
        }

        for (let i = 0; i < fes; i++) {
          result.push(end);
        }

        return result;
      }

          },
          "r": {
            "sa": 1.5 * Math.PI,
            "ea": 0.5 * Math.PI
          }
        }
        ctx.beginPath();
        
        ctx.arc(x, y, rad, arc[direct].sa, arc[direct].ea);
        ln = getArc((x, y, rad, arc[direct].sa, arc[direct].ea));
        
        if(sThick) {
          ctx.strokeStyle = "black";
          ctx.lineWidth = sThick;
          ctx.stroke();
        }
        ctx.fill();
      }
      function rect(x, y, width, height, stroke, sides) {
        if(stroke) {
          ctx.strokeStyle = "black";
          ctx.lineWidth = stroke;
          ctx.beginPath();
          if (sides && (sides.includes("u") || sides.includes("d") || sides.includes("l") || sides.includes("r"))) {
            if(sides.includes("u")) {
              ctx.moveTo(x, y);
              ctx.lineTo(x + width, y);
            }
            if(sides.includes("d")) {
              ctx.moveTo(x, y + height);
              ctx.lineTo(x + width, y + height);
            }
            if(sides.includes("l")) {
              ctx.moveTo(x, y);
              ctx.lineTo(x, y + height);
            }
            if(sides.includes("r")) {
              ctx.moveTo(x + width, y);
              ctx.lineTo(x + width, y + height);
            }
          } else {
            ctx.moveTo(x, y)
            ctx.lineTo(x, y + height);
            ctx.lineTo(x + width, y + height);
            ctx.lineTo(x + width, y);
            ctx.lineTo(x, y);
          }
          ctx.stroke();
        }
        ctx.fillRect(x, y, width, height);
      }
      function eyes(pupil) {
        let head = trail[trail.length - 1];
        let pupRad = 4;
        ctx.fillStyle = "White";
        circle((head.x * 20) + 10, (head.y * 20) + 10, 7, 2);
        ctx.fillStyle = "Black";
        if(pupil) {
          if(pupil === "shrink") {
            pupRad = 2;
          }
          if(!isNaN(pupil)) {
            pupRad = pupil;
          }
          if(Array.isArray(pupil) && pupil[0].toLowerCase() === "dead" && !isNaN(pupil[1])) {
            let cx = (head.x + 0.5) * 20;
            cx += xv;
            let cy = (head.y + 0.5) * 20;
            cy += yv;
            let rad = pupil[1] / Math.sqrt(2);
            let prevAlph = ctx.globalAlpha;

            let c1x = cx - rad;
            let c1y = cy - rad;

            let c2x = cx + rad;
            let c2y = cy + rad;

            let c3x = cx + rad;
            let c3y = cy - rad;

            let c4x = cx - rad;
            let c4y = cy + rad;

            ctx.beginPath();

            ctx.moveTo(c1x, c1y);
            ctx.lineTo(c2x, c2y);

            ctx.moveTo(c3x, c3y);
            ctx.lineTo(c4x, c4y);

            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.25 * pupil[1];
            ctx.stroke();
            
            ctx.globalAlpha = 1 - ctx.globalAlpha;
            circle(cx, cy, 2);

            ctx.globalAlpha = prevAlph;
            
            return;
          }
        }
        if(xv == 1) {
          circle((head.x * 20) + 12.5, (head.y * 20) + 10, pupRad);
        } else if(xv == -1) {
          circle((head.x * 20) + 7.5, (head.y * 20) + 10, pupRad);
        } else if(yv == 1) {
          circle((head.x * 20) + 10, (head.y * 20) + 12.5, pupRad);
        } else if(yv == -1) {
          circle((head.x * 20) + 10, (head.y * 20) + 7.5, pupRad);
        } else {
          circle((head.x * 20) + 10, (head.y * 20) + 10, pupRad);
        }
      }
      function showHead() {
        let head = trail[trail.length - 1];
        let x1 = head.x * 20;
        let y1 = head.y * 20;
        let x2 = x1 + 10;
        let y2 = y1 + 10;
        let gs2 = gs / 2;
        let rad = 10;
        let sides = {
          "u": ["0", "0", "l", "r"],
          "d": ["0", "0", "l", "r"],
          "l": ["u", "d", "0", "0"],
          "r": ["u", "d", "0", "0"]
        }
        ctx.fillStyle = arrToCol(color[1]);
        if(pyv == -1) { // up
          rect(x1, y2, gs, gs2, outline, sides.u);
          semiCirc(x2, y2, rad, "u", outline);
        }
        if(pyv == 1) { // down
          rect(x1, y1, gs, gs2, outline, sides.d);
          semiCirc(x2, y2, rad, "d", outline);
        }
        if(pxv == -1) { // left
          rect(x2, y1, gs2, gs, outline, sides.l);
          semiCirc(x2, y2, rad, "l", outline);
        }
        if(pxv == 1) { // right
          rect(x1, y1, gs2, gs, outline, sides.r);
          semiCirc(x2, y2, rad, "r", outline);
        }
      }
      function showTail() {
        let tile = trail[0];
        let size = dec(tween(1, 0.8, tail)[trail.length - 1]);
        let shr = dec(1).minus(size).times(10);
        let x1 = tile.x * 20;
        let y1 = tile.y * 20;
        let x2 = x1 + 10;
        let y2 = y1 + 10;
        let gs2 = gs / 2;
        let rad = size.times(10);
        let txv = trail[1].x - tile.x;
        let tyv = trail[1].y - tile.y;
        ctx.fillStyle = snakeColor(0);
        if(tyv == -1) { // up
          semiCirc(x2, y2, flo(rad), "d", outline);
          rect(x1 + flo(shr), y1, gs - flo(shr.times(2)), gs2, outline, ["l", "r"]);
        }
        if(tyv == 1) { // down
          semiCirc(x2, y2 + flo(shr), flo(rad), "u", outline);
          rect(x1 + flo(shr), y1 + flo(shr.plus(9)), gs - flo(shr.times(2)), gs2, outline, ["l", "r"]);
        }
        if(txv == -1) { // left
          semiCirc(x2 - flo(shr), y2, flo(rad), "r", outline);
          rect(x1, y1 + flo(shr), gs2, gs - flo(shr.times(2)), outline, ["u", "d"]);
        }
        if(txv == 1) { // right
          semiCirc(x2 + flo(shr), y2, flo(rad), "l", outline);
          rect(x1 + flo(shr.plus(10)), y1 + flo(shr), gs2, gs - flo(shr.times(2)), outline, ["u", "d"]);
        }
      }
      function showTrailC(id) {
        let tile = trail[id];
        let size = dec(tween(1, 0.8, tail, 2, 2)[trail.length - id - 1]);
        let shr = dec(1).minus(size).times(10);
        let x1 = (tile.x + 0.5) * 20;
        let y1 = (tile.y + 0.5) * 20;
        let rad = size.times(10);
        ctx.fillStyle = snakeColor(id);
        circle(x1, y1, flo(rad), outline);
      }
      function showTrailT(id) {
        let tile = trail[id];
        let size = dec(tween(1, 0.8, tail, 2, 2)[trail.length - id - 1]);
        let shr = dec(1).minus(size).times(10);
        let x1 = tile.x * 20;
        let y1 = tile.y * 20;
        let x2 = x1 + 10;
        let y2 = y1 + 10;
        let xv1 = trail[id + 1].x - tile.x;
        let yv1 = trail[id + 1].y - tile.y;
        let xv2 = trail[id - 1].x - tile.x;
        let yv2 = trail[id - 1].y - tile.y;
        let gs2 = gs / 2;
        let rects = {
          "u": {
            "x": x1 + flo(shr),
            "y": y1,
            "w": gs - flo(shr.times(2)),
            "h": gs2,
            "s": ["0", "0", "l", "r"]
          },
          "d": {
            "x": x1 + flo(shr),
            "y": y2,
            "w": gs - flo(shr.times(2)),
            "h": gs2,
            "s": ["0", "0", "l", "r"]
          },
          "l": {
            "x": x1,
            "y": y1 + flo(shr),
            "w": gs2,
            "h": gs - flo(shr.times(2)),
            "s": ["u", "d", "0", "0"]
          },
          "r": {
            "x": x1 + flo(shr.plus(10)),
            "y": y1 + flo(shr),
            "w": gs2,
            "h": gs - flo(shr.times(2)),
            "s": ["u", "d", "0", "0"]
          }
        }
        let p1 = null;
        let p2 = null;
        
        if(yv1 == -1) { // up
          p1 = "u";
        } else if(yv1 == 1) { // down
          p1 = "d";
        } else if(xv1 == -1) { // left
          p1 = "l";
        } else if(xv1 == 1) { // right
          p1 = "r";
        }
        
        if(yv2 == -1) { // up
          p2 = "u";
        } else if(yv2 == 1) { // down
          p2 = "d";
        } else if(xv2 == -1) { // left
          p2 = "l";
        } else if(xv2 == 1) { // right
          p2 = "r";
        }
        
        if(p1 || p2) {
          ctx.fillStyle = snakeColor(id);
          let straight = false;
          if(p1 == "u" && p2 == "d") straight = true;
          if(p1 == "d" && p2 == "u") straight = true;
          if(p1 == "l" && p2 == "r") straight = true;
          if(p1 == "r" && p2 == "l") straight = true;
          let s1 = [...rects[p1].s];
          if(straight == false) {
            s1.splice(s1.indexOf(p2), 1);
          }
          
          rect(
            rects[p1].x, 
            rects[p1].y, 
            rects[p1].w, 
            rects[p1].h,
            outline,
            s1
          );
          let s2 = [...rects[p2].s];
          if(straight == false) {
            s2.splice(s2.indexOf(p1), 1);
          }
          rect(
            rects[p2].x,
            rects[p2].y,
            rects[p2].w,
            rects[p2].h,
            outline,
            s2
          );
        }
      }
      function apple() {
        ctx.fillStyle = "red";
        let pulse = tween(8, 6, 60, 0, 0, "easeInOutCirc");
        pulse = pulse.concat(tween(6, 8, 60, 0, 0, "easeInOutCirc"));
        let size = pulse[frame % pulse.length];
        circle((ax + 0.5) * gs, (ay + 0.5) * gs, size, outline);
      }
      function showBG() {
        ctx.fillStyle = background[0];

        for(var x=0; x<20; x++) {
          if(((x-1) % 2) + 1 === 1) {
            for(var i=0; i<20; i++) {
              ctx.fillStyle=background[(20 - i - 1) % 2];
              rect(i*20,x*20,gs,gs);
            }
          } else {
            for(var i=0; i<20; i++) {
              ctx.fillStyle=background[(20 - i) % 2];
              rect(i*20,x*20,gs,gs);
            }
          }
        }
      }
      function showTrail() {
        showTail();
        for(var i=1;i<trail.length - 1;i++) {
          showTrailC(i);
        }
        for(var i=1;i<trail.length - 1;i++) {
          showTrailT(i);
        }
      }
      function display() {
        showBG();
        apple();
        showTrail();
        showHead();
        eyes();
        showScore();
      }
      
      function game() {
        if(paused || countdown > 0 || dead) {
          display();
          return;
        }
        
        px += xv;
        py += yv;

        if(px<0) {
          die();
          dead = true;
        }
        if(px>tc-1) {
          die();
          dead = true;
        }
        if(py<0) {
          die();
          dead = true;
        }
        if(py>tc-1) {
          die();
          dead = true;
        }
        
        newTrail = [...trail];

        if(running) {
          newTrail.push({x:px,y:py});
          while(newTrail.length>tail) {
            newTrail.shift();
          }
        }
        
        for(let i = 0; i < newTrail.length - 1; i++) {
          if(running && newTrail[i].x == px && newTrail[i].y == py && !paused && (xv !== 0 || yv !== 0)) {
            die();
            dead = true;
          }
        }
        
        if(!dead) {
          if(running) {
            trail = newTrail;
          }
          pxv = xv;
          pyv = yv;
        }
        
        display();

        if(ax==px && ay==py) {
          tail++;
          ax=Math.floor(Math.random()*tc);
          ay=Math.floor(Math.random()*tc);
          canSpawn = false;
          while(canSpawn === false) {
            canSpawn = true;
            for(var i=0;i<trail.length;i++) {
              rect(trail[i].x*gs,trail[i].y*gs,gs,gs);
              if(trail[i].x==ax && trail[i].y==ay) {
                ax=Math.floor(Math.random()*tc);
                ay=Math.floor(Math.random()*tc);
                 canSpawn = false;
              }
            }
          }
          display();
        }
        if(dead) {
          showBG();
          apple();
          showTrail();
          showHead();
          eyes(3);
          showScore();
          setTimeout(function() {
            showBG();
            apple();
            showTrail();
            showHead();
            eyes("shrink");
            showScore();
          }, 50)
        }
        showScore();
      }
      
      function dir() {
        if(pyv == -1) {
          return "u";
        }
        if(pyv == 1) {
          return "d";
        }
        if(pxv == -1) {
          return "l";
        }
        if(pxv == 1) {
          return "r";
        }
        return "s";
      }
      
      function up() {
        if(dir() == "d" || paused || countdown > 0) {
          setTimeout(function() {
            if(dir() == "d" || paused || countdown > 0) return;
            xv = 0;
            yv = -1;
          }, 1000/10);
          return;
        }
        xv = 0;
        yv = -1;
      }
      
      function down() {
        if(dir() == "u" || paused || countdown > 0) {
          setTimeout(function() {
            if(dir() == "u" || paused || countdown > 0) return;
              xv = 0;
              yv = 1;
          }, 1000/10);
          return;
        }
        xv = 0;
        yv = 1;
      }
      
      function left() {
        if(dir() == "r" || paused || countdown > 0) {
          setTimeout(function() {
            if(dir() == "r" || paused || countdown > 0) return;
              xv = -1;
              yv = 0;
          }, 1000/10);
          return;
        }
        xv = -1;
        yv = 0;
      }
      
      function right() {
        if(dir() == "l" || paused || countdown > 0) {
          setTimeout(function() {
            if(dir() == "l" || paused || countdown > 0) return;
              xv = 1;
              yv = 0;
          }, 1000/10);
          return;
        }
        xv = 1;
        yv = 0;
      }
      
      function pause() {
        if(dir() == "s" || countdown > 0) return;
        if(paused) {
          countdown = 3;
          paused = 0;
        } else {
          paused = 1;
        }
      }
      
      function getKey(code) {
        for(let i in keybinds) {
          if(keybinds[i].includes(code)) {
            return i[0];
          }
        }
      }
      
      gameControl.on('connect', function(gamepad) {
        gamepad.on('up0', up);
        gamepad.on('down0', down);
        gamepad.on('left0', left);
        gamepad.on('right0', right);
        gamepad.on('up1', up);
        gamepad.on('down1', down);
        gamepad.on('left1', left);
        gamepad.on('right1', right);
        gamepad.on('button12', up);
        gamepad.on('button13', down);
        gamepad.on('button14', left);
        gamepad.on('button15', right);
        gamepad.on('select', pause);
      });

      function keyPush(evt) {
        const dis = (running === false || countdown > 0);
        const code = evt.keyCode;
        let key = evt.key;
        key = key.toUpperCase();

        if(getKey(code) == "u" && !dis) {
          up();
        }
        if(getKey(code) == "d" && !dis) {
          down();
        }
        if(getKey(code) == "l" && !dis) {
          left();
        }
        if(getKey(code) == "r" && !dis) {
          right();
        }
        if(getKey(code) == "p" && !dis) {
          pause();
        }
        if(key === "\\") {
          kill();
        }
      }
      upBtn.onclick = function() {
        if(running === false || countdown > 0) return;
        up();
      }
      downBtn.onclick = function() {
        if(running === false || countdown > 0) return;
        down();
      }
      leftBtn.onclick = function() {
        if(running === false || countdown > 0) return;
        left();
      }
      rightBtn.onclick = function() {
        if(running === false || countdown > 0) return;
        right();
      }
      
      var title = document.getElementById("title");
      var pBtn = document.getElementById("play");
      var pBtnArea = document.getElementById("playArea");
      var pOut = document.getElementById("playOutline");
      var pTxt = document.getElementById("playText");
      var trans = document.getElementById("trans");
      var gameElem = document.getElementById("game");
      var cZone = document.getElementById("comfort");
      function comfort() {
        if(window.innerWidth > window.innerHeight) {
          cZone.style.width = "95vh";
          cZone.style.height = "95vh";
          return;
        }
        if(window.innerHeight > window.innerWidth) {
          cZone.style.width = "95vw";
          cZone.style.height = "95vw";
          return;
        }
        cZone.style.width = "95vh";
        cZone.style.height = "95vh";
      }
      setInterval(comfort, 50);
      setTimeout(function() {
        title.src = img[0];
      }, 100);
      setTimeout(function() {
        title.src = img[1];
      }, 4100);
      setTimeout(function() {
        title.style.transform = "translate(-50%, 0)";
        title.style.top = "21px";
        title.style.width = "40%";
      }, 4300);
      setTimeout(function() {
        pBtn.style.display = "inline-block";
        setTimeout(function() {
          pOut.style.opacity = "1";
          pBtnArea.style.display = "inline-block";
        }, 50)
      }, 6100);
      setTimeout(function() {
        pTxt.style.opacity = "1";
      }, 6600);
      pBtn.onclick = function() {
        def();
        trans.style.display = "inline-block";
        trans.src = img[2];
        setTimeout(function() {
          trans.src = img[3];
          gameElem.style.display = "inline-block";
          title.style.display = "none";
          pBtn.style.display = "none";
          pBtnArea.style.display = "none";
          cZone.style.backgroundColor = "hsl(0, 0%, 27%)";
          setTimeout(function() {
            trans.src = img[4];
            setTimeout(function() {
              trans.style.display = "none";
              running = true;
            }, 2100);
          }, 600);
        }, 2100);
      };
      const dieAnim = {
        "stage1": function() {
          sfx.die();
          clearInterval(gameloop);
          (function() {
            let interval7362 = setInterval(function() {
              if(trail.length > 2) {
                trail.shift();
                if(tail - trail.length < 2) {
                  showBG();
                  apple();
                  showTrail();
                  showHead();
                  eyes("shrink");
                  showScore();
                };
                if(tail - trail.length == 2) {
                  showBG();
                  apple();
                  showTrail();
                  showHead();
                  eyes(["dead", 2]);
                  showScore();
                };
                if(tail - trail.length >= 3) {
                  showBG();
                  apple();
                  showTrail();
                  showHead();
                  eyes(["dead", 4]);
                  showScore();
                };
              } else {
                showBG();
                apple();

                let head = trail[trail.length - 1];
                let x1 = (head.x + 0.5) * 20;
                let y1 = (head.y + 0.5) * 20;
                let rad = 10;
                ctx.fillStyle = arrToCol(color[1]);
                circle(x1, y1, rad, outline);
                eyes(["dead", 4]);

                showScore();
                clearInterval(interval7362);
                interval7362 = null;
              }
            }, 1430 / (tail - 1));
            let waitUntil = setInterval(function() {
              if(interval7362 === null) {
                clearInterval(waitUntil);
                setTimeout(dieAnim.stage2, 500);
              };
            }, 100);
          })();
        },
        "stage2": function() {
          trans.style.display = "inline-block";
          trans.src = img[2];
          setTimeout(dieAnim.stage3, 2100);
        },
        "stage3": function() {
          trans.src = img[3];
          gameElem.style.display = "none";
          title.style.display = "inline-block";
          pBtn.style.display = "inline-block";
          pBtnArea.style.display = "inline-block";
          cZone.style.backgroundColor = "hsl(0, 0%, 0%)";
          setTimeout(dieAnim.stage4, 600);
        },
        "stage4": function() {
          trans.src = img[4];
          setTimeout(function() {
            trans.style.display = "none";
          }, 2100);
        }
      }
      function die() {
        clearInterval(gameloop);
        setTimeout(function() {
          gameloop = null;
        }, 2500);

        showBG();
        apple();
        showTrail();
        showHead();
        eyes("shrink");
        showScore();
        dieAnim.stage1();
        /*
          setTimeout(function() {
            trans.src = img[4];
            setTimeout(function() {
              trans.style.display = "none";
            }, 2100);
          }, 600);
        */
      }
      var pBtnSize = dec(30);
      var tar362 = dec(30); // target
      var mom362 = dec(0); // momentum
      var res362 = dec(1); // resistance
      var count362 = 0; // counter
      setInterval(function() {
        pBtn.style.width = pBtnSize.toString() + "%";
      }, 1000/33);
      setInterval(function() {
        console.log((pBtnSize === tar362));
        let dis362 = tar362.minus(pBtnSize).abs();
        let inc362 = dis362;
        if(tar362.gt(pBtnSize)) {
          res362 = res362.times(0.9);
          mom362 = mom362.plus(inc362);
        }
        if(tar362.lt(pBtnSize)) {
          console.log(mom362);
          res362 = res362.times(0.9);
          mom362 = mom362.minus(inc362);
        }
        if(count362 > 0) {
          if(dis362 < 0.02 && mom362.gt(0.2)) {
            if(count362 >= 4) {
              count362 = 0;
              res362 = dec(1);
              mom362 = dec(0);
              pBtnSize = tar362;
            } else {
              count++;
            }
          } else {
            count362 = 0;
          }
        }
        mom362 = mom362.times(res362);
        pBtnSize = pBtnSize.plus(mom362);
      }, 1000/30);
      pBtnArea.onmouseenter = function() {
        tar362 = dec(35);
        console.log(tar362.toString());
      };
      pBtnArea.onmouseleave = function() {
        tar362 = dec(30);
        console.log(tar362.toString());
      };

      function kill() { // if you can't reload due to extreme performance issues with loops, this will send you to a blank page faster than reloading will. Activated by pressing [\]
        window.location.href = "about:blank";
        window.location.replace("about:blank");
        document.body.innerHTML = "";
      }
    </script>
